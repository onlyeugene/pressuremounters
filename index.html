<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pressure Mounting Prayer Group | ONE FAITH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Subtle Prayer Banner -->
    <div class="prayer-banner">
      🕊️ PRAYER TIMES: MONDAYS AND FRIDAYS 12AM-1AM WAT (NIGERIAN TIME)
    </div>

    <header class="main-header container">
      <div class="logo-section">
        <div class="logo-circle"></div>
        <span>PRESSURE MOUNTING PRAYER GROUP</span>
      </div>
    </header>

    <main>
      <!-- Hero Section -->
      <section class="hero">
        <div class="container hero-content">
          <h1>PRESSURE MOUNTING PRAYER GROUP</h1>
          <p>
            "For where two or three gather in my name, there am I with them." —
            Matthew 18:20
          </p>
        </div>
      </section>

      <!-- Members Section -->
      <section class="projects-section container">
        <h2 class="section-title">Members</h2>
        <div class="projects-grid" id="members-grid">
          <!-- Members will be dynamically loaded here by script.js -->
        </div>
      </section>
    </main>

    <footer class="footer container">
      <p>
        &copy; <span id="current-year"></span> Pressure Mounting Prayer Group.
        One Faith. All Rights Reserved.
      </p>
    </footer>

    <script>
      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
    <script src="./script.js"></script>
  </body>
</html>
